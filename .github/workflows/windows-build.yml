name: Windows Build

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-build.yml"
      - "work/CartoonCursorWindows/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/windows-build.yml"
      - "work/CartoonCursorWindows/**"
      - "README.md"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore work/CartoonCursorWindows/CartoonCursorWindows.csproj

      - name: Build
        run: dotnet build work/CartoonCursorWindows/CartoonCursorWindows.csproj --configuration Release --no-restore

      - name: Package
        shell: pwsh
        run: ./work/CartoonCursorWindows/scripts/package.ps1 -Runtime ${{ matrix.runtime }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: CartoonCursor-${{ matrix.runtime }}
          path: outputs/windows/CartoonCursor-${{ matrix.runtime }}.zip
          if-no-files-found: error
